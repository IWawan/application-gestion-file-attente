<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion file d'attente</title>
  <link rel="stylesheet" href="/static/css/style_index.css">
</head>
<body>
  <!-- Hamburger Menu -->
  <div id="hamburger-menu" class="hamburger-menu">
    <button id="hamburger-btn" aria-label="Ouvrir le menu">☰</button>
  </div>

  <!-- Header et Contrôles Principaux -->
  <header id="menu" class="menu" hidden>
    <button id="btn-upload">Charger</button>
    <button id="btn-load">Afficher</button>
    <button id="btn-clear-all">Effacer</button>
    <button id="btn-banner-popup">Bandeau</button>
  </header>

  <!-- Menu de modification des bureaux -->
  <div class="menu-settings" id="menu-settings-bureaux" hidden>
    <h3>Modifier les bureaux</h3>
    <label for="bureau1">Bureau 1 :</label>
    <input type="text" id="bureau1" value="Bureau 1"><br>
    <label for="bureau2">Bureau 2 :</label>
    <input type="text" id="bureau2" value="Bureau 2"><br>
    <label for="bureau3">Bureau 3 :</label>
    <input type="text" id="bureau3" value="Bureau 3"><br>
    <button id="btn-save-bureaux">Sauvegarder</button>
    <button id="btn-cancel-bureaux">Annuler</button>
  </div>

  <!-- Sélection des Bureaux -->
  <nav id="bureaux_buttons" class="bureaux_buttons">
    <button data-bureau="Bureau 1">Bureau 1</button>
    <button data-bureau="Bureau 2">Bureau 2</button>
    <button data-bureau="Bureau 3">Bureau 3</button>
  </nav>

  <!-- Liste Dynamique des Usagers -->
  <section id="usagers_list_container" class="usagers_list_container"></section>

  <!-- Affichage Courant -->
  <section id="display_section" class="display_section" hidden>
    <h2 id="usager_display"></h2>
    <button id="btn-end-rdv" class="clear_button">RDV TERMINÉ</button>
  </section>

  <!-- Popup Bandeau -->
  <div id="popup_bandeau" class="popup_bandeau" hidden>
    <div class="popup_content">
      <h3>Message pour le bandeau</h3>
      <input id="bandeau_input" type="text" placeholder="Entrez un message">
      <div class="popup_buttons">
        <button id="btn-send-banner">Envoyer</button>
        <button id="btn-close-banner">Annuler</button>
      </div>
    </div>
  </div>

  <input id="fileInput" type="file" accept=".xlsx" hidden>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
  <script src="/static/js/script_index.js"></script>
</body>
</html>
